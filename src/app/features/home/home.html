<div class="home">
  <h1>Benvenuto, {{ user()?.fullName }}</h1>
  <p>Ruolo: {{ user()?.role }}</p>

  @if (assetCount() !== null) {
    <p>Chiamata protetta riuscita — asset trovati: {{ assetCount() }}</p>

    <p class="error">{{ error() }}</p>
  } @else {
    <p>Caricamento...</p>
  }

  <button (click)="logout()">Logout</button>
</div>
