<div class="form-page">
  <!-- Intestazione: freccia di ritorno + titolo sulla stessa riga -->
  <header class="page-header">
    <a routerLink="/assets" class="back-button" aria-label="Torna agli asset">←</a>
    <h2>Nuovo Asset</h2>
  </header>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div>
      <label>Nome</label>
      <input type="text" formControlName="name" />
    </div>

    <div>
      <label>Numero di serie</label>
      <input type="text" formControlName="serialNumber" />
    </div>

    <div>
      <label>Categoria</label>
      <input type="text" formControlName="category" />
    </div>

    <div>
      <label>Posizione</label>
      <input type="text" formControlName="location" />
    </div>

    <div>
      <label>Data di acquisto</label>
      <input type="date" formControlName="purchaseDate" />
    </div>

    <button type="submit">Salva</button>
  </form>

  @if (error()) {
    <p>{{ error() }}</p>
  }
</div>
