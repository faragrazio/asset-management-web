<div class="form-page">
  <header class="page-header">
    <a routerLink="/assets" class="back-button" aria-label="Torna agli asset">←</a>
    <h2>Modifica Asset</h2>
  </header>

  @if (error()) {
    <p>{{ error() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    @if (isLoading()) {
      <!-- scheletro: stessa card e stessi campi del form vero -->
      @for (i of skeletonFields; track i) {
        <div>
          <span class="skeleton" style="width: 30%; height: 0.9rem;"></span>    <!-- etichetta -->
          <span class="skeleton" style="width: 100%; height: 2.75rem;"></span>  <!-- input -->
        </div>
      }
      <span class="skeleton" style="width: 150px; height: 2.75rem;"></span>      <!-- bottone -->
    } @else {
      <div>
        <label>Nome</label>
        <input type="text" formControlName="name" />
      </div>

      <div>
        <label>Categoria</label>
        <input type="text" formControlName="category" />
      </div>

      <div>
        <label>Posizione</label>
        <input type="text" formControlName="location" />
      </div>

      <button type="submit">Salva modifiche</button>
    }
  </form>
</div>
